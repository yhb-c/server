<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 980" width="800" height="980">
  <!-- Background -->
  <rect width="800" height="980" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="24" font-weight="bold" fill="black" text-anchor="middle">系统架构对比</text>

  <!-- PyQt5 Architecture Section -->
  <g id="pyqt5-section">
    <!-- Section Title -->
    <text x="400" y="80" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="20" font-weight="bold" fill="black" text-anchor="middle">PyQt5 单机架构</text>

    <!-- UI Layer -->
    <rect x="250" y="105" width="300" height="70" rx="10" fill="#FFB3BA" stroke="black" stroke-width="2"/>
    <text x="400" y="135" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">UI 界面层</text>
    <text x="400" y="158" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" fill="black" text-anchor="middle">PyQt5 Widgets</text>

    <!-- Signal/Slot Arrow -->
    <path d="M 400 175 L 400 210" stroke="black" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="420" y="197" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black">信号与槽</text>

    <!-- Business Logic Layer -->
    <rect x="250" y="210" width="300" height="70" rx="10" fill="#BAFFC9" stroke="black" stroke-width="2"/>
    <text x="400" y="240" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">业务逻辑层</text>
    <text x="400" y="263" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" fill="black" text-anchor="middle">Qt Signal/Slot 机制</text>

    <!-- Signal/Slot Arrow -->
    <path d="M 400 280 L 400 315" stroke="black" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="420" y="302" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black">信号与槽</text>

    <!-- Data Layer -->
    <rect x="250" y="315" width="300" height="70" rx="10" fill="#BAE1FF" stroke="black" stroke-width="2"/>
    <text x="400" y="345" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">数据层</text>
    <text x="400" y="368" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" fill="black" text-anchor="middle">本地数据处理</text>
  </g>

  <!-- Divider Line -->
  <line x1="50" y1="425" x2="750" y2="425" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- C/S Architecture Section -->
  <g id="cs-section">
    <!-- Section Title -->
    <text x="400" y="460" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="20" font-weight="bold" fill="black" text-anchor="middle">C/S 客户端-服务器架构</text>

    <!-- Client Side -->
    <g id="client-side">
      <!-- Client Box -->
      <rect x="50" y="485" width="300" height="320" rx="10" fill="#FFF5E1" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="200" y="508" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">客户端</text>

      <!-- UI Layer -->
      <rect x="75" y="520" width="250" height="55" rx="8" fill="#FFB3BA" stroke="black" stroke-width="2"/>
      <text x="200" y="543" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">UI 界面层</text>
      <text x="200" y="562" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">PyQt5 Widgets</text>

      <!-- Signal/Slot Arrow -->
      <path d="M 200 575 L 200 600" stroke="black" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <text x="220" y="592" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="black">信号与槽</text>

      <!-- Business Logic -->
      <rect x="75" y="600" width="250" height="55" rx="8" fill="#BAFFC9" stroke="black" stroke-width="2"/>
      <text x="200" y="623" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">业务逻辑层</text>
      <text x="200" y="642" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">Qt Signal/Slot</text>

      <!-- Communication Layer -->
      <rect x="75" y="675" width="250" height="55" rx="8" fill="#E0BBE4" stroke="black" stroke-width="2"/>
      <text x="200" y="698" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">通信层</text>
      <text x="200" y="717" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">WebSocket Client</text>

      <!-- Local Data -->
      <rect x="75" y="750" width="250" height="45" rx="8" fill="#BAE1FF" stroke="black" stroke-width="2"/>
      <text x="200" y="768" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">本地数据</text>
      <text x="200" y="786" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">缓存/配置</text>
    </g>

    <!-- Communication Arrows -->
    <g id="communication">
      <!-- WebSocket -->
      <path d="M 325 702 L 450 702" stroke="#9D4EDD" stroke-width="3" fill="none" marker-end="url(#arrowhead-purple)"/>
      <path d="M 450 712 L 325 712" stroke="#9D4EDD" stroke-width="3" fill="none" marker-end="url(#arrowhead-purple)"/>
      <text x="387" y="697" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" font-weight="bold" fill="#9D4EDD" text-anchor="middle">WebSocket</text>
      <text x="387" y="730" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="#9D4EDD" text-anchor="middle">实时双向通信</text>
    </g>

    <!-- Server Side -->
    <g id="server-side">
      <!-- Server Box -->
      <rect x="450" y="485" width="300" height="320" rx="10" fill="#F0F8FF" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="600" y="508" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">服务器端</text>

      <!-- WebSocket Server -->
      <rect x="475" y="520" width="250" height="55" rx="8" fill="#E0BBE4" stroke="black" stroke-width="2"/>
      <text x="600" y="543" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">WebSocket 服务器</text>
      <text x="600" y="562" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">实时消息推送</text>

      <!-- API Layer -->
      <rect x="475" y="595" width="250" height="55" rx="8" fill="#FFFFBA" stroke="black" stroke-width="2"/>
      <text x="600" y="618" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">Go API 层</text>
      <text x="600" y="637" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">RESTful / gRPC</text>

      <!-- Business Logic -->
      <rect x="475" y="670" width="250" height="55" rx="8" fill="#BAFFC9" stroke="black" stroke-width="2"/>
      <text x="600" y="693" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">业务处理层</text>
      <text x="600" y="712" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">检测/分析/计算</text>

      <!-- Database -->
      <rect x="475" y="745" width="250" height="55" rx="8" fill="#BAE1FF" stroke="black" stroke-width="2"/>
      <text x="600" y="768" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">数据存储层</text>
      <text x="600" y="787" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" fill="black" text-anchor="middle">本地文件管理</text>
    </g>
  </g>

  <!-- Bottom Note Section -->
  <g id="note-section">
    <!-- Note Box -->
    <rect x="50" y="840" width="700" height="110" rx="10" fill="#FFF9E6" stroke="black" stroke-width="2"/>

    <!-- Note Title -->
    <text x="400" y="865" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" font-weight="bold" fill="black" text-anchor="middle">说明：Go API 的作用</text>

    <!-- Note Content -->
    <text x="70" y="890" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 提供 RESTful 接口，处理客户端的 HTTP 请求（如配置查询、历史数据获取）</text>
    <text x="70" y="912" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 与 WebSocket 配合，WebSocket 负责实时推送，Go API 负责请求-响应式交互</text>
    <text x="70" y="934" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 统一管理业务逻辑、权限验证、数据处理等服务端核心功能</text>
  </g>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9D4EDD"/>
    </marker>
  </defs>
</svg>