<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <!-- Background -->
  <rect width="900" height="700" fill="white"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="24" font-weight="bold" fill="black" text-anchor="middle">开发模式说明</text>

  <!-- Windows Client Side -->
  <g id="windows-client">
    <!-- Client Box -->
    <rect x="50" y="80" width="350" height="550" rx="15" fill="#E3F2FD" stroke="black" stroke-width="3"/>

    <!-- Windows Icon & Title -->
    <rect x="70" y="100" width="40" height="40" rx="5" fill="#0078D4" stroke="black" stroke-width="2"/>
    <text x="90" y="128" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Win</text>
    <text x="225" y="130" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="20" font-weight="bold" fill="black" text-anchor="middle">Windows 开发设备</text>

    <!-- Subtitle -->
    <text x="225" y="160" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" fill="#555" text-anchor="middle">客户端开发</text>

    <!-- Function Section -->
    <rect x="70" y="180" width="310" height="420" rx="10" fill="white" stroke="#0078D4" stroke-width="2"/>

    <!-- Function Title -->
    <text x="225" y="210" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="18" font-weight="bold" fill="black" text-anchor="middle">主要职责</text>

    <!-- Function 1 -->
    <rect x="90" y="230" width="270" height="100" rx="8" fill="#FFB3BA" stroke="black" stroke-width="2"/>
    <text x="225" y="255" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="15" font-weight="bold" fill="black" text-anchor="middle">1. 纯客户端功能实现</text>
    <text x="100" y="280" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• UI 界面设计与交互</text>
    <text x="100" y="300" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 本地数据缓存与配置</text>
    <text x="100" y="320" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 用户操作响应处理</text>

    <!-- Function 2 -->
    <rect x="90" y="350" width="270" height="100" rx="8" fill="#BAFFC9" stroke="black" stroke-width="2"/>
    <text x="225" y="375" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="15" font-weight="bold" fill="black" text-anchor="middle">2. 请求信号发送</text>
    <text x="100" y="400" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 按规定格式封装请求</text>
    <text x="100" y="420" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 通过 WebSocket 发送</text>
    <text x="100" y="440" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 接收并解析服务器响应</text>

    <!-- Independent Note -->
    <rect x="90" y="470" width="270" height="110" rx="8" fill="#FFF9E6" stroke="#FF9800" stroke-width="2"/>
    <text x="225" y="495" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="#FF6F00" text-anchor="middle">独立开发</text>
    <text x="100" y="520" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">除信息交互外，客户端功能</text>
    <text x="100" y="540" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">完全独立实现，不依赖服务</text>
    <text x="100" y="560" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">器的具体实现细节</text>
  </g>

  <!-- Communication Section -->
  <g id="communication">
    <!-- Bidirectional Arrows -->
    <defs>
      <marker id="arrow-right" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#9D4EDD"/>
      </marker>
      <marker id="arrow-left" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#9D4EDD"/>
      </marker>
    </defs>

    <!-- Request Arrow -->
    <path d="M 400 320 L 500 320" stroke="#9D4EDD" stroke-width="4" fill="none" marker-end="url(#arrow-right)"/>
    <text x="450" y="315" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" font-weight="bold" fill="#9D4EDD" text-anchor="middle">请求信号</text>
    <text x="450" y="340" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="#9D4EDD" text-anchor="middle">规定格式</text>

    <!-- Response Arrow -->
    <path d="M 500 380 L 400 380" stroke="#9D4EDD" stroke-width="4" fill="none" marker-end="url(#arrow-left)"/>
    <text x="450" y="375" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" font-weight="bold" fill="#9D4EDD" text-anchor="middle">响应数据</text>
    <text x="450" y="400" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="#9D4EDD" text-anchor="middle">规定格式</text>

    <!-- Protocol Box -->
    <rect x="410" y="430" width="80" height="60" rx="8" fill="#E0BBE4" stroke="#9D4EDD" stroke-width="2"/>
    <text x="450" y="450" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="12" font-weight="bold" fill="black" text-anchor="middle">通信协议</text>
    <text x="450" y="470" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="black" text-anchor="middle">WebSocket</text>
    <text x="450" y="485" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="11" fill="black" text-anchor="middle">JSON 格式</text>
  </g>

  <!-- Linux Server Side -->
  <g id="linux-server">
    <!-- Server Box -->
    <rect x="500" y="80" width="350" height="550" rx="15" fill="#F1F8E9" stroke="black" stroke-width="3"/>

    <!-- Linux Icon & Title -->
    <rect x="730" y="100" width="40" height="40" rx="5" fill="#FCC624" stroke="black" stroke-width="2"/>
    <text x="750" y="128" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="18" font-weight="bold" fill="black" text-anchor="middle">Tux</text>
    <text x="675" y="130" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="20" font-weight="bold" fill="black" text-anchor="middle">Linux 服务器</text>

    <!-- Subtitle -->
    <text x="675" y="160" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="16" fill="#555" text-anchor="middle">服务端开发</text>

    <!-- Function Section -->
    <rect x="520" y="180" width="310" height="420" rx="10" fill="white" stroke="#8BC34A" stroke-width="2"/>

    <!-- Function Title -->
    <text x="675" y="210" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="18" font-weight="bold" fill="black" text-anchor="middle">主要职责</text>

    <!-- Function 1 -->
    <rect x="540" y="230" width="270" height="80" rx="8" fill="#BAE1FF" stroke="black" stroke-width="2"/>
    <text x="675" y="255" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="15" font-weight="bold" fill="black" text-anchor="middle">1. 模型推理与训练</text>
    <text x="550" y="280" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• AI 模型加载与推理</text>
    <text x="550" y="300" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 模型训练与优化</text>

    <!-- Function 2 -->
    <rect x="540" y="330" width="270" height="80" rx="8" fill="#FFFFBA" stroke="black" stroke-width="2"/>
    <text x="675" y="355" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="15" font-weight="bold" fill="black" text-anchor="middle">2. 请求信号处理</text>
    <text x="550" y="380" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 接收并解析客户端请求</text>
    <text x="550" y="400" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 执行对应功能逻辑</text>

    <!-- Function 3 -->
    <rect x="540" y="430" width="270" height="80" rx="8" fill="#BAFFC9" stroke="black" stroke-width="2"/>
    <text x="675" y="455" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="15" font-weight="bold" fill="black" text-anchor="middle">3. 数据管理</text>
    <text x="550" y="480" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 本地文件存储管理</text>
    <text x="550" y="500" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">• 数据持久化与查询</text>

    <!-- Independent Note -->
    <rect x="540" y="530" width="270" height="50" rx="8" fill="#FFF9E6" stroke="#FF9800" stroke-width="2"/>
    <text x="675" y="555" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" font-weight="bold" fill="#FF6F00" text-anchor="middle">独立开发</text>
    <text x="550" y="575" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="13" fill="black">服务端功能独立实现与测试</text>
  </g>

  <!-- Bottom Note -->
  <rect x="50" y="650" width="800" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="450" y="675" font-family="Noto Serif CJK SC, AR PL UMing TW MBE, sans-serif" font-size="14" fill="black" text-anchor="middle">
    <tspan font-weight="bold">核心思路：</tspan>两台设备通过规定格式进行信息交互，除通信外各自独立实现对应功能，互不干扰
  </text>
</svg>