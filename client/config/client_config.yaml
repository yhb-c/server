# 客户端配置文件
# 服务器地址: 192.168.0.121

server:
  api_url: http://192.168.0.121:8084  # 服务端API地址
  ws_url: ws://192.168.0.121:8085     # WebSocket地址

ui:
  theme: light      # 主题: light/dark
  language: zh_CN   # 语言: zh_CN/en_US

data:
  cache_dir: ./cache  # 缓存目录
  log_dir: ./logs     # 日志目录

network:
  timeout: 30         # 请求超时时间(秒)
  retry_times: 3      # 重试次数

log_level: INFO       # 日志级别: DEBUG, INFO, WARNING, ERROR
