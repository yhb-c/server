# 数据库配置
database:
  host: localhost
  port: 3306
  username: root
  password: your_password
  database: liquid_db
  charset: utf8mb4
  parseTime: true
  maxOpenConns: 100
  maxIdleConns: 10
  connMaxLifetime: 3600  # 秒

# 服务器配置
server:
  host: 0.0.0.0
  port: 8080
  mode: release  # debug, release, test

# 数据迁移配置
migration:
  # 任务 YAML 文件目录
  mission_yaml_dir: /home/lqj/liquid/server/database/config/mission

  # CSV 结果文件目录
  csv_result_dir: /home/lqj/liquid/server/database/mission_result

  # 配置文件目录
  config_dir: /home/lqj/liquid/server/database/config

  # 批量插入大小
  batch_size: 1000

# 日志配置
logging:
  level: info  # debug, info, warn, error
  file: logs/server.log
  max_size: 100  # MB
  max_backups: 10
  max_age: 30  # 天
