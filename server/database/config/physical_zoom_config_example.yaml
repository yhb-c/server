# 物理变焦设备配置示例
# 用于配置海康威视摄像头的物理变焦功能

# 通道1配置 - 海康威视球机
channel1_device:
  ip: "192.168.1.100"          # 设备IP地址
  port: 8000                   # 设备端口，默认8000
  username: "admin"            # 登录用户名
  password: "admin123"         # 登录密码
  channel: 1                   # 设备通道号
  enable_physical_zoom: true   # 是否启用物理变焦
  zoom_capabilities:
    min_zoom: 1.0             # 最小变焦倍数
    max_zoom: 30.0            # 最大变焦倍数
    zoom_step: 0.5            # 变焦步长
    auto_focus: true          # 是否支持自动聚焦

# 通道2配置 - 海康威视枪机（不支持变焦）
channel2_device:
  ip: "192.168.1.101"
  port: 8000
  username: "admin"
  password: "admin123"
  channel: 1
  enable_physical_zoom: false  # 枪机通常不支持变焦

# 通道3配置 - 海康威视球机
channel3_device:
  ip: "192.168.1.102"
  port: 8000
  username: "admin"
  password: "admin123"
  channel: 1
  enable_physical_zoom: true
  zoom_capabilities:
    min_zoom: 1.0
    max_zoom: 20.0            # 不同型号支持的倍数可能不同
    zoom_step: 0.5
    auto_focus: true

# 通道4配置 - 海康威视球机
channel4_device:
  ip: "192.168.1.103"
  port: 8000
  username: "admin"
  password: "admin123"
  channel: 1
  enable_physical_zoom: true
  zoom_capabilities:
    min_zoom: 1.0
    max_zoom: 25.0
    zoom_step: 0.5
    auto_focus: true

# 全局配置
global_settings:
  # 物理变焦优先级：true表示优先使用物理变焦，false表示优先使用数字变焦
  prefer_physical_zoom: true
  
  # 连接超时时间（秒）
  connection_timeout: 10
  
  # 变焦操作超时时间（秒）
  zoom_timeout: 15
  
  # 自动重连间隔（秒）
  reconnect_interval: 30
  
  # 错误重试次数
  max_retry_count: 3

# 使用说明：
# 1. 将此文件重命名为 physical_zoom_config.yaml
# 2. 根据实际设备信息修改IP地址、用户名、密码等
# 3. 确保设备支持PTZ控制功能
# 4. 在放大窗口中使用以下快捷键：
#    - 鼠标滚轮：变焦放大/缩小
#    - R键：重置变焦到1倍
#    - D键：显示物理变焦状态
#    - F键：自动聚焦
#    - H键：显示/隐藏帮助信息
#    - E键：切换锐化增强
#    - N键：切换降噪处理
#    - C键：切换对比度增强
# 
# 注意：系统只支持物理变焦，需要海康威视PTZ设备支持
