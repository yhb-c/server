version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: liquid_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: liquid_db
      MYSQL_USER: liquid_user
      MYSQL_PASSWORD: liquid_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - liquid_network

  api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liquid_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: liquid_user
      DB_PASSWORD: liquid_password
      DB_NAME: liquid_db
    volumes:
      - ./server/config:/app/config
      - ./server/database:/app/database
    networks:
      - liquid_network

volumes:
  mysql_data:

networks:
  liquid_network:
    driver: bridge
